<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7X — {{ 'تسجيل الدخول' if lang == 'ar' else 'Admin Login' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Kufi Arabic', sans-serif;
      background: #0a0a0f; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #12121a; border: 1px solid #2a2a3e; border-radius: 16px;
      padding: 48px; width: 100%; max-width: 400px;
    }
    .login-box h1 { text-align: center; font-size: 2rem; margin-bottom: 8px; }
    .login-box h1 span { color: #00b84d; }
    .login-box p { text-align: center; color: #8888a0; margin-bottom: 32px; font-size: 0.9rem; }
    input {
      width: 100%; padding: 14px 16px; margin-bottom: 16px;
      background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px;
      color: #fff; font-family: inherit; font-size: 0.9rem; outline: none;
    }
    input:focus { border-color: #00843D; }
    button {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #00843D; color: #fff; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #00b84d; }
    .flash { padding: 10px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-size: 0.85rem; }
    .flash.error { background: rgba(206,17,38,0.15); border: 1px solid #ce1126; color: #ce1126; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>7<span>X</span></h1>
    <p>{{ 'لوحة التحكم' if lang == 'ar' else 'Admin Panel' }}</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        {% for cat, msg in msgs %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <input type="text" name="username" placeholder="{{ 'اسم المستخدم' if lang == 'ar' else 'Username' }}" required>
      <input type="password" name="password" placeholder="{{ 'كلمة المرور' if lang == 'ar' else 'Password' }}" required>
      <button type="submit">{{ 'دخول' if lang == 'ar' else 'Login' }}</button>
    </form>
  </div>
</body>
</html>
